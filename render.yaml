# Render Blueprint — https://render.com/docs/blueprint-spec
# New → Blueprint → connect repo. Add secrets in the dashboard (see DEPLOY.md).
#
# API only: build must NOT run `npm run build` (Vite). Use `npm ci` + `npm run start:api`.

services:
  - type: web
    name: lattice-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci
    startCommand: npm run start:api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
